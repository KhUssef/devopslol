name: Terraform IaC Pipeline

# Déclencheur : push sur la branche principale
on:
  push:
    branches:
      - main

jobs:
  terraform:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest

    steps:
      # Étape 1 : Récupération du code source
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Étape 2 : Installation de Terraform CLI
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      # Étape 3 : Initialisation (DLC - Init)
      - name: Terraform Init
        run: terraform init

      # Étape 4 : Planification (DLC - Plan / Gate)
      - name: Terraform Plan
        run: terraform plan
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      # Étape 5 : Application conditionnelle (DLC - Apply)
      # Ne s'exécute QUE si le Plan a réussi
      - name: Terraform Apply
        if: success()
        run: terraform apply -auto-approve
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
